name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  privacy-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync

      - name: Privacy scan (BLOCKING)
        run: uv run python scripts/pre_publish_scan.py

      - name: Lint
        run: uv run ruff check src tests

      - name: Tests
        run: uv run pytest
